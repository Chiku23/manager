<!-- Main App Shell -->
<div class="min-h-screen bg-gray-50 dark:bg-gray-950">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center px-4 gap-4
                 bg-white dark:bg-gray-900
                 border-b border-gray-200 dark:border-gray-800">

    <a routerLink="/" class="flex items-center gap-2 shrink-0 select-none">
      <div class="w-7 h-7 rounded-lg bg-violet-600 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="text-sm font-semibold tracking-tight text-gray-900 dark:text-white">Manager</span>
    </a>

    <div class="h-5 w-px bg-gray-200 dark:bg-gray-700 shrink-0"></div>

    <button id="workspace-btn"
      class="flex items-center gap-1.5 px-2 py-1 rounded-md text-sm font-medium
             text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
      My Workspace
      <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <div class="flex-1 max-w-md mx-auto">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" />
        </svg>
        <input id="global-search" type="search" placeholder="Search issues, projects…"
          class="w-full pl-9 pr-16 py-1.5 text-sm rounded-lg
                 bg-gray-100 dark:bg-gray-800
                 border border-transparent focus:border-violet-500 focus:bg-white dark:focus:bg-gray-900
                 text-gray-900 dark:text-gray-100 placeholder-gray-400 outline-none transition-all" />
        <kbd class="absolute right-3 top-1/2 -translate-y-1/2 hidden sm:inline-flex items-center
                    px-1.5 py-0.5 text-[10px] font-medium rounded
                    bg-gray-200 dark:bg-gray-700 text-gray-500 dark:text-gray-400">⌘K</kbd>
      </div>
    </div>

    <div class="flex items-center gap-1 ml-auto shrink-0">
      <button id="create-btn"
        class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg
               bg-violet-600 hover:bg-violet-700 text-white transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        <span class="hidden sm:inline">Create</span>
      </button>

      <button id="notif-btn"
        class="relative w-9 h-9 flex items-center justify-center rounded-lg
               text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-violet-500"></span>
      </button>

      <button id="theme-toggle"
        class="w-9 h-9 flex items-center justify-center rounded-lg
               text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3v1m0 16v1m8.66-9H21M3 12H2m15.07-6.07l-.71.71M7.64 17.36l-.71.71
               M19.07 19.07l-.71-.71M6.34 6.34l-.71-.71
               M12 7a5 5 0 100 10A5 5 0 0012 7z" />
        </svg>
        <svg class="w-5 h-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>

      <div class="w-8 h-8 rounded-full bg-violet-600 text-white text-xs font-semibold
                  flex items-center justify-center cursor-pointer hover:ring-2 hover:ring-violet-400 transition-all ml-1">
        AK
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="fixed top-14 left-0 bottom-0 w-64 z-40 flex flex-col
                bg-white dark:bg-gray-900
                border-r border-gray-200 dark:border-gray-800
                overflow-y-auto">

    <div class="px-3 pt-4 pb-2">
      <p class="px-2 mb-1 text-[10px] font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500">Projects</p>

      <a routerLink="/" id="nav-proj-alpha"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5"
        routerLinkActive="bg-violet-50 dark:bg-violet-950 text-violet-700 dark:text-violet-300 font-medium"
        [routerLinkActiveOptions]="{exact:true}">
        <span class="w-5 h-5 rounded-md bg-violet-600 flex items-center justify-center text-white text-[10px] font-bold shrink-0">A</span>
        Project Alpha
      </a>
      <a routerLink="/" id="nav-proj-beta"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5
               text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors">
        <span class="w-5 h-5 rounded-md bg-emerald-500 flex items-center justify-center text-white text-[10px] font-bold shrink-0">B</span>
        Project Beta
      </a>
      <a routerLink="/" id="nav-proj-gamma"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5
               text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors">
        <span class="w-5 h-5 rounded-md bg-amber-500 flex items-center justify-center text-white text-[10px] font-bold shrink-0">G</span>
        Gamma Platform
      </a>
      <button id="nav-add-proj"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg w-full
               text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300
               hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Add project
      </button>
    </div>

    <div class="mx-3 my-2 h-px bg-gray-100 dark:bg-gray-800"></div>

    <div class="px-3 pb-2">
      <p class="px-2 mb-1 text-[10px] font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500">My Work</p>

      <a routerLink="/" id="nav-dashboard"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5 text-sm transition-colors
               text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800"
        routerLinkActive="bg-violet-50 dark:bg-violet-950 text-violet-600 dark:text-violet-400"
        [routerLinkActiveOptions]="{exact:true}">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>

      <a routerLink="/issues/all" id="nav-my-issues"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5
               text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        My Issues
        <span class="ml-auto text-[11px] font-semibold bg-violet-100 dark:bg-violet-900 text-violet-600 dark:text-violet-300 px-1.5 py-0.5 rounded-full">12</span>
      </a>
      <a routerLink="/" id="nav-sprints"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg mb-0.5
               text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 text-sm transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        Sprints
      </a>
    </div>

    <div class="mx-3 mb-2">
      <div class="rounded-xl bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-700/50 p-2">
        <p class="px-2 mb-1 text-[10px] font-semibold uppercase tracking-widest text-violet-500 dark:text-violet-400">Project Alpha</p>
        <a routerLink="/board" id="nav-board"
          class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg mb-0.5 text-sm transition-colors"
          routerLinkActive="bg-white dark:bg-gray-800 text-violet-600 dark:text-violet-400 font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
          </svg>
          Board
        </a>
        <a routerLink="/backlog" id="nav-backlog"
          class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg mb-0.5 text-sm transition-colors"
          routerLinkActive="bg-white dark:bg-gray-800 text-violet-600 dark:text-violet-400 font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Backlog
        </a>
        <a routerLink="/" id="nav-timeline"
          class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg mb-0.5
                 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          Timeline
        </a>
        <a routerLink="/" id="nav-reports"
          class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg
                 text-gray-600 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          Reports
        </a>
      </div>
    </div>

    <div class="mt-auto px-3 pb-4 border-t border-gray-100 dark:border-gray-800 pt-3">
      <a routerLink="/settings" id="nav-settings"
        class="flex items-center gap-2.5 px-2 py-2 rounded-lg text-sm transition-colors"
        routerLinkActive="bg-violet-50 dark:bg-violet-950 text-violet-600 dark:text-violet-400">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Settings
      </a>
      <div class="flex items-center gap-2.5 px-2 py-2 mt-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors">
        <div class="w-7 h-7 rounded-full bg-violet-600 flex items-center justify-center text-white text-[11px] font-semibold shrink-0">AK</div>
        <div class="min-w-0">
          <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate">Ankit Kumar</p>
          <p class="text-[11px] text-gray-400 truncate">ankit@example.com</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 pt-14 min-h-screen">
    <router-outlet />
  </main>

</div>
